<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Allowance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #1a1a2e; color: #fff; min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; color: #ffd700; }
    .kid-card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .kid-name { font-size: 1.2em; font-weight: bold; margin-bottom: 8px; }
    .kid-balance { font-size: 1.5em; color: #4ecca3; }
    .kid-details { font-size: 0.85em; color: #888; margin-top: 8px; }
    .daily-growth { color: #ffd700; }
    .add-form { background: #16213e; border-radius: 12px; padding: 16px; margin-top: 20px; }
    .add-form h2 { margin-bottom: 12px; }
    input, select, button { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 6px; }
    input, select { background: #0f3460; color: #fff; }
    button { background: #e94560; color: #fff; cursor: pointer; font-weight: bold; }
    button:hover { background: #ff6b6b; }
    .withdraw-btn { background: #f39c12; margin-top: 5px; }
    .withdraw-btn:hover { background: #e67e22; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💰 Kids Allowance</h1>
    <div id="kids"></div>
    
    <div class="add-form">
      <h2>Add Deposit</h2>
      <select id="kidSelect"></select>
      <input type="number" id="amount" placeholder="Amount (₪)" step="0.01">
      <input type="date" id="date">
      <button onclick="addDeposit()">Add</button>
    </div>
    
    <div class="add-form">
      <h2>Withdraw</h2>
      <select id="kidSelectWithdraw"></select>
      <input type="number" id="withdrawAmount" placeholder="Amount (₪)" step="0.01">
      <button class="withdraw-btn" onclick="withdraw()">Withdraw</button>
    </div>
  </div>

  <script>
    const OWNER = 'AmitYablonski';
    const REPO = 'kids-allowance';
    const FILE_PATH = 'data.json';
    const INTEREST_RATE = 0.10; // 10% per month = ~0.304% per day
    
    let kidsData = [];
    let sha = '';
    
    function getDailyInterestRate() {
      return Math.pow(1 + INTEREST_RATE, 1/30) - 1; // Daily rate from monthly
    }
    
    function getDaysDiff(startDate) {
      const now = new Date();
      const start = new Date(startDate);
      return (now - start) / (1000 * 60 * 60 * 24);
    }
    
    function calculateBalance(deposits, withdrawals) {
      const all = [...deposits, ...(withdrawals || []).map(w => ({ amount: -w.amount, date: w.date }))];
      return all.reduce((sum, d) => {
        const days = getDaysDiff(d.date);
        const interest = d.amount * Math.pow(1 + getDailyInterestRate(), days);
        return sum + interest;
      }, 0);
    }
    
    function getDailyGrowth(deposits, withdrawals) {
      const balance = calculateBalance(deposits, withdrawals);
      const dailyRate = getDailyInterestRate();
      return balance * dailyRate;
    }
    
    async function fetchData() {
      try {
        const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`);
        if (!response.ok) throw new Error('File not found');
        const data = await response.json();
        sha = data.sha;
        kidsData = JSON.parse(atob(data.content));
      } catch (e) {
        kidsData = [
          { name: 'Aviv', deposits: [{ amount: 20, date: '2025-12-01' }, { amount: 16.67, date: '2026-04-01' }] },
          { name: 'Shaked', deposits: [{ amount: 20, date: '2025-12-01' }, { amount: 16.67, date: '2026-04-01' }] },
          { name: 'Bar', deposits: [{ amount: 20, date: '2025-12-01' }, { amount: 16.67, date: '2026-04-01' }] }
        ];
      }
      render();
    }
    
    function render() {
      const container = document.getElementById('kids');
      const select = document.getElementById('kidSelect');
      const selectWithdraw = document.getElementById('kidSelectWithdraw');
      
      container.innerHTML = kidsData.map(kid => {
        const balance = calculateBalance(kid.deposits, kid.withdrawals);
        const dailyGrowth = getDailyGrowth(kid.deposits, kid.withdrawals);
        const depositsList = kid.deposits.map(d => `${d.amount}₪ (${d.date})`).join(', ');
        const withdrawalsList = kid.withdrawals?.map(w => `-${w.amount}₪ (${w.date})`).join(', ') || '';
        return `
          <div class="kid-card">
            <div class="kid-name">${kid.name}</div>
            <div class="kid-balance">${balance.toFixed(2)} ₪</div>
            <div class="kid-details">Daily growth: <span class="daily-growth">+${dailyGrowth.toFixed(2)} ₪</span></div>
            <div class="kid-details">Deposits: ${depositsList || 'None'}</div>
            ${withdrawalsList ? `<div class="kid-details">Withdrawals: ${withdrawalsList}</div>` : ''}
          </div>
        `;
      }).join('');
      
      select.innerHTML = kidsData.map(kid => `<option value="${kid.name}">${kid.name}</option>`).join('');
      selectWithdraw.innerHTML = kidsData.map(kid => `<option value="${kid.name}">${kid.name}</option>`).join('');
    }
    
    function addDeposit() {
      const name = document.getElementById('kidSelect').value;
      const amount = parseFloat(document.getElementById('amount').value);
      const date = document.getElementById('date').value;
      
      if (!amount || !date) return alert('Please enter amount and date');
      
      const kid = kidsData.find(k => k.name === name);
      if (kid) {
        kid.deposits.push({ amount, date });
        render();
        saveData();
      }
    }
    
    function withdraw() {
      const name = document.getElementById('kidSelectWithdraw').value;
      const amount = parseFloat(document.getElementById('withdrawAmount').value);
      const date = new Date().toISOString().split('T')[0];
      
      if (!amount) return alert('Please enter amount');
      
      const kid = kidsData.find(k => k.name === name);
      if (kid) {
        if (!kid.withdrawals) kid.withdrawals = [];
        kid.withdrawals.push({ amount, date });
        render();
        saveData();
      }
    }
    
    async function saveData() {
      const pat = new URLSearchParams(window.location.search).get('pat');
      if (!pat) {
        alert('No PAT found. Add ?pat=YOUR_TOKEN to URL');
        return;
      }
      
      const content = JSON.stringify(kidsData, null, 2);
      const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'Update allowance data',
          content: btoa(unescape(encodeURIComponent(content))),
          sha: sha
        })
      });
      
      if (response.ok) {
        const data = await response.json();
        sha = data.content.sha;
      }
    }
    
    fetchData();
  </script>
</body>
</html>
